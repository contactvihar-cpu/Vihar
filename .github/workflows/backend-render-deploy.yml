name: Backend Auto Deploy

on:
  push:
    branches:
      - main
    paths:
      - "server.js"
      - "package.json"
      - "package-lock.json"
      - "openai-gemini-compat/**"
      - ".github/workflows/backend-render-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing GitHub secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered successfully."
